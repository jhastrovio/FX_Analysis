# FX Analysis Project Configuration
# =================================
# Analytics-only: Configuration for read-only data access and analysis parameters.
#
# This file defines analysis parameters, metrics, and output formats. It does NOT
# define dataset paths or schemas - those come from the master manifest.
#
# NOTE: All data access is read-only with respect to /FX_Data - General.
# Outputs are ephemeral analysis artifacts, not authoritative datasets.

# Project Information
project:
  name: "FX_Analysis"
  version: "1.0.0"
  description: "FX trading model analysis and portfolio construction"
  storage_type: "hybrid"

# OneDrive Storage Configuration (Local Filesystem Approach)
storage:
  onedrive:
    raw_data: "clean/models_signals_systemacro"
    processed_data: "clean/models_signals_systemacro/Processed"
    test: "clean/models_signals_systemacro/Test"
  local:
    outputs: "outputs"
    consolidated: "outputs/consolidated"
    summary_stats: "outputs/summary_stats"
    analysis: "outputs/analysis"
    logs: "outputs/logs"
    test: "outputs/test"

# Analysis Input File Paths
# Specific file paths for analysis scripts (can be overridden via CLI arguments)
# Paths can be absolute or relative to OneDrive root (for onedrive.* entries)
analysis_inputs:
  onedrive:
    portfolio_allocations: null  # Static reference workbook in _meta/Portfolio_Allocations.xlsx. Parsed externally or converted before CLI use.
    model_positions: null  # Expanded models_signals_systemacro dataset with per-model, per-ccy positions.
    model_returns_unscaled: null  # Legacy return-based input retained for non-attribution workflows.
    final_positions: null  # Clean target portfolio positions, preferably from manifest dataset position_systemacro.
    daily_portfolio_change: null  # Out of scope for the target-position strategy breakdown workflow.

# File Type Definitions
file_types:
  # Raw data files (stored in OneDrive)
  raw:
    model_returns:
      pattern: "{model_id}_{model_name}.csv"
      description: "Individual model daily return files"
      location: "onedrive.raw_data"
      columns:
        date: ["Date", "date", "DATE"]
        returns: ["ID:*", "Returns", "returns"]
        exclude: ["(ex carry)"]
    
    model_index:
      pattern: "Model_Index.csv"
      description: "Model metadata and classification file"
      location: "onedrive.raw_data"
      columns:
        id: "ID"
        name: "Name"
        category: "CATEGORY"
        family: "FAMILY"
  
  # Processed data files (ephemeral analysis artifacts stored locally)
  processed:
    master_matrix:
      pattern: "Master_Return_Matrix.csv"
      description: "Temporary consolidated daily returns for analysis (ephemeral, not authoritative)"
      location: "local.consolidated"
      # Note: Legacy name 'master_matrix'. This is a temporary analysis artifact.
      columns:
        date: "Date"
        returns: "* - *"  # Pattern for model columns
    
    summary_stats:
      pattern: "{date_range}_Stats_{date}.csv"
      description: "Summary statistics for each model"
      location: "local.summary_stats"
    
    correlation_matrix:
      pattern: "Correlation_Matrix_{date_range}_{timestamp}.csv"
      description: "Correlation matrix between all models"
      location: "local.analysis"
    
    rolling_metrics:
      pattern: "Rolling_Metrics_{date_range}_{window}_{timestamp}.csv"
      description: "Rolling performance metrics over time"
      location: "local.analysis"
    
    portfolio_weights:
      pattern: "Portfolio_Weights_{strategy}_{date_range}_{timestamp}.csv"
      description: "Portfolio weights for different strategies"
      location: "local.analysis"
    
    performance_analysis:
      pattern: "Performance_Analysis_{analysis_type}_{date_range}_{timestamp}.csv"
      description: "Performance analysis results"
      location: "local.analysis"

  # Test data files (read-only inputs in OneDrive, ephemeral outputs local)
  test:
    model_returns:
      pattern: "test_{model_id}_{model_name}.csv"
      description: "Test individual model daily return files"
      location: "local.test"
      columns:
        date: ["Date", "date", "DATE"]
        returns: ["ID:*", "Returns", "returns"]
        exclude: ["(ex carry)"]
    
    model_index:
      pattern: "Test_Model_Index.csv"
      description: "Test model metadata and classification file"
      location: "local.test"
      columns:
        id: "ID"
        name: "Name"
        category: "CATEGORY"
        family: "FAMILY"
    
    master_matrix:
      pattern: "Test_Master_Return_Matrix.csv"
      description: "Test consolidated daily returns for all models"
      location: "onedrive.test"
      columns:
        date: "Date"
        returns: "* - *"  # Pattern for model columns
    
    summary_stats:
      pattern: "Test_{date_range}_Stats_{date}.csv"
      description: "Test summary statistics for each model"
      location: "onedrive.test"

# Analysis Configuration
analysis:
  # Annualization factor for converting daily metrics to annual
  annualization_factor: 260  # Trading days per year
  
  # Date ranges
  date_ranges:
    full: "2000-01-01 to present"
    10year: "10 years"
    5year: "5 years"
    2year: "2 years"
    1year: "1 year"
    6month: "6 months"
    3month: "3 months"
    2month: "2 months"
    1month: "1 month"
    1week: "1 week"
    3day: "3 day"
    1day: "1 day"

  
  # Performance metrics
  performance_metrics:
    - "annualized_return"
    - "return"
    - "volatility"
    - "sharpe_ratio"
    - "max_drawdown"
 
  
  # Rolling windows
  rolling_windows:
    - 30    # 1 month
    - 60    # 2 months
    - 90    # 3 months
    - 180   # 6 months
    - 260   # 1 year
    - 520   # 2 years
  
  # Correlation analysis
  correlation:
    min_correlation: 0.7
    max_correlation: 0.95
    correlation_method: "pearson"

# Portfolio Construction
portfolio:
  # Equal weighting
  equal_weight:
    rebalance_frequency: "monthly"
    min_models: 10
    max_models: 100

# Portfolio analysis constraints
portfolio_constraints:
  defaults:
    aum_usd: 1000000
    target_vol_pct: 10.0
    max_single_ccy_exposure_pct: 15.0
    max_aggregate_ccy_exposure_pct: 100.0

  portfolios:
    "10014":
      aum_usd: 1000000
      target_vol_pct: 10.0
      max_single_ccy_exposure_pct: 100.0
      max_aggregate_ccy_exposure_pct: 500.0
 

# Model Categories and Families
model_classification:
  categories:
    - "carry"
    - "valuation"
    - "cross asset"
    - "static"
    - "positioning"
    - "capital flow"
    - "technical"
    - "macro"
  
  families:
    - "simple carry"
    - "real carry"
    - "PPP"
    - "moving average"
    - "rate correlation"
    - "risk aversion"
    - "single cross"
    - "COT"
    - "FX hedge"
    - "equity flow"
    - "current account"
    - "cross section mr"
    - "inflation level"
    - "inflation change"
    - "time series momentum"
    - "time series mr"
    - "IP growth"

# Logging Configuration (logs stored locally)
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_pattern: "fx_analysis_{timestamp}.log"
  location: "local.logs"
  max_files: 10
  max_size: "10MB"

# Output Formats
output_formats:
  csv:
    encoding: "utf-8"
    date_format: "%Y-%m-%d"
    float_format: "%.6f"
  
  excel:
    sheet_name: "FX_Analysis"
    engine: "openpyxl"
  
  json:
    indent: 2
    date_format: "iso"

# Validation Rules
validation:
  data_quality:
    min_date: "2000-01-01"
    max_missing_pct: 0.05    # Max 5% missing data
    min_models: 50           # Minimum models required
    max_volatility: 0.50     # Max 50% daily volatility (sanity check)
  
  model_metadata:
    required_fields: ["ID", "Name", "CATEGORY", "FAMILY"]
    id_format: "integer"
    name_format: "string" 
